name: Mobile Quality

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  mobile-quality:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint app components hooks constants lib tests

      - name: Test
        run: npm run test

      - name: Build web
        run: npm run build:web
